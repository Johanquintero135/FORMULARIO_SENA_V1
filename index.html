<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/Estilos.css">
    <title>Formulario_Sena_V1</title>
</head>
<body>

    <main>
        <h1>Formulario_Sena_V1</h1>
        <h2>Gracias por dejar sus datos</h2>

        <div class="contenedor">
            <form id="survey-form" action="#" method="post">
                <label for="name">NAME</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>

                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="Age">AGE</label>
                <input type="number" id="Age" name="Age" placeholder="Enter your age" required>

                <label for="option1">CHOOSE AN OPTION</label>
                <select id="option1" name="chosenOption" required>
                    <option value="">Select an option</option>
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>

                <label>DO YOU PLAN TO BUY A NEW CAR IN THE NEXT 5 YEARS?</label>
                <input class="Input" type="radio" name="futureCar" id="optionYes" value="yes"> Yes<br>
                <input class="Input" type="radio" name="futureCar" id="optionNo" value="no"> No<br>
                <input class="Input" type="radio" name="futureCar" id="optionMaybe" value="maybe"> Maybe<br>

                <label for="favoriteBrand">¿WHAT IS YOUR FAVORITE CAR BRAND?</label>
                <select id="favoriteBrand" name="favoriteBrand" required>
                    <option value="" selected>Select an marca</option>
                    <option value="option1">Ferrari</option>
                    <option value="option2">Bugatti</option>
                    <option value="option3">Jaguar</option>
                    <option value="option4">Lamborghini</option>
                    <option value="option5">Porche</option>
                    <option value="option6">Xiaomi</option>
                    <option value="option7">Mercedes</option>
                    <option value="option8">Jeep</option>
                    <option value="option9">Audi</option>
                    <option value="option10">BMW</option>
                    <option value="option11">Aston Martin</option>
                    <option value="option12">Pagani</option>
                </select>

                <label>¿WHAT TYPE OF MEANS OF TRANSPORTATION DO YOU OWN?</label>
                <input class="Inputt" type="checkbox" name="transportation" value="car"> Car<br>
                <input class="Inputt" type="checkbox" name="transportation" value="boat"> Boat<br>
                <input class="Inputt" type="checkbox" name="transportation" value="bicycle"> Bicycle<br>
                <input class="Inputt" type="checkbox" name="transportation" value="motorcycle"> Motorcycle<br>
                <input class="Inputt" type="checkbox" name="transportation" value="plane"> Plane<br>
                <input class="Inputt" type="checkbox" name="transportation" value="bike"> Bike<br>
                <input class="Inputt" type="checkbox" name="transportation" value="bus"> Bus<br>

                <label for="comments">¿ANY COMMENTS OR SUGGESTIONS?</label>
                <input class="Comentario" type="text" id="comments" name="comments" placeholder="Please enter your comments">

                <button class="Boton" type="submit">Submit</button>
            </form>


            <!--BUTTON-->
            <div id="modal-success" class="modal hidden">
                <div id="modal-content">
                    <h2>Datos Enviados Con Éxito!</h2>
                    <button id="close-modal">Cerrar</button>
                 </div>
            </div>
        </div>
    </main>
    
    <script type="module" src="./Js/Javascripts.js"></script>
</body>
<footer>
</footer>
</html>
